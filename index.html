<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>

    <!--CSS-->
    <link rel="stylesheet" href="style.css">
    <!-- Boxicons CSS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="profile-card-img.jpg" alt="" class="profile-img">
        </div>
        <div class="text-data">
            <span class="name">Dinujaya Tharaka</span>
            <span class="job">Software Engineer | UI/UX Designer</span>
        </div>
        <div class="media-buttons">
            <a href="#" style="background-color: #4267B2;" class="link">
                <i class='bx bxl-facebook-square'></i>
            </a>
            <a href="#" style="background-color: #1DA1F2;" class="link">
                <i class='bx bxl-twitter'></i>
            </a>
            <a href="#" style="background-color: #E1306C;" class="link">
                <i class='bx bxl-instagram'></i>
            </a>
            <a href="#" style="background-color: #FF0000;" class="link">
                <i class='bx bxl-youtube'></i>
            </a>
        </div>
        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>
        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="value">60k</span>
            </div>
            <div class="data">
                <i class='bx bx-message-rounded'></i>
                <span class="value">20k</span>
            </div>
            <div class="data">
                <i class='bx bx-share' ></i>
                <span class="value">15.50k</span>
            </div>
        </div>

    </div>

</body>

</html>
